name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm test

      - name: Dependency audit
        run: pnpm audit:prod

      - name: Create CI manifest fixture
        run: |
          mkdir -p generated
          pnpm exec tsx <<'EOF'
          import { createManifest } from "@afilmory/schema";
          import { writeFileSync } from "node:fs";

          writeFileSync(
            "generated/photos-manifest.json",
            `${JSON.stringify(
              createManifest({ generatedAt: "1970-01-01T00:00:00.000Z" }),
            )}\n`,
          );
          EOF

      - name: Build
        run: SKIP_MANIFEST_BUILD=true pnpm build
